<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ひまわり 写真台帳</title>
<style>
  :root {
    --sun:#F5A623;--sun-dark:#D4881A;--green:#2D6A4F;--green2:#52B788;
    --bg:#FFFBF2;--card:#fff;--text:#1A1A1A;--sub:#666;
    --border:#E8DCC8;--danger:#E53E3E;--shadow:0 2px 12px rgba(0,0,0,0.08);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px;}

  /* ヘッダー */
  .header{background:linear-gradient(135deg,var(--sun),var(--sun-dark));padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(245,166,35,0.3);}
  .header-icon{font-size:22px;}
  .header-title{font-size:17px;font-weight:800;color:#fff;}
  .header-sub{font-size:11px;color:rgba(255,255,255,0.85);}

  /* タブ */
  .tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:52px;z-index:99;}
  .tab{flex:1;padding:12px 4px;font-size:13px;font-weight:700;color:var(--sub);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;font-family:inherit;}
  .tab.active{color:var(--green);border-bottom-color:var(--green);}

  /* セクション */
  .section{margin:13px 12px 0;background:var(--card);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;}
  .section-title{background:var(--green);color:#fff;padding:9px 14px;font-size:13px;font-weight:700;}
  .section-body{padding:12px 12px 4px;}

  .field{margin-bottom:11px;}
  label{display:block;font-size:12px;font-weight:600;color:var(--sub);margin-bottom:4px;}
  input[type=text],input[type=date],select,textarea{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:16px;font-family:inherit;background:#FAFAF8;color:var(--text);-webkit-appearance:none;appearance:none;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--sun);background:#fff;}
  textarea{resize:vertical;min-height:66px;}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

  /* 工事箇所カード */
  .places-container{margin:13px 12px 0;}
  .place-card{background:var(--card);border-radius:14px;box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden;}
  .place-header{padding:9px 12px;display:flex;align-items:center;justify-content:space-between;}
  .place-header-before{background:linear-gradient(90deg,var(--sun),#F7BA5A);}
  .place-header-after{background:linear-gradient(90deg,var(--green),var(--green2));}
  .place-num{font-size:13px;font-weight:800;color:#fff;}
  .btn-remove-place{background:rgba(255,255,255,0.3);border:none;color:#fff;font-size:20px;width:28px;height:28px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .place-body{padding:10px 10px 6px;}

  /* 写真エリア */
  .photo-area{border:2px dashed var(--border);border-radius:10px;padding:8px;background:#FAFAF8;}
  .photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:7px;}
  .photo-thumb-wrap{position:relative;}
  .photo-thumb{aspect-ratio:1;border-radius:8px;object-fit:cover;width:100%;cursor:pointer;}
  .photo-del{position:absolute;top:-5px;right:-5px;background:var(--danger);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;}
  .btn-camera{background:var(--green);color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:700;width:100%;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-family:inherit;}
  .btn-camera-after{background:#2C5282;}
  input[type=file]{display:none;}

  /* ボタン群 */
  .btn-add-place{display:flex;align-items:center;justify-content:center;gap:6px;background:#fff;border:2px dashed var(--sun);color:var(--sun-dark);border-radius:12px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-bottom:12px;font-family:inherit;}
  .big-btn{display:block;width:calc(100% - 24px);margin:12px 12px 0;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;text-align:center;}
  .btn-save{background:linear-gradient(135deg,var(--sun),var(--sun-dark));color:#fff;box-shadow:0 4px 16px rgba(245,166,35,0.4);}
  .btn-line{background:#06C755;color:#fff;box-shadow:0 4px 14px rgba(6,199,85,0.35);}
  .btn-load-json{background:linear-gradient(135deg,#2C5282,#1A365D);color:#fff;box-shadow:0 4px 14px rgba(44,82,130,0.35);}

  /* 保存済みリスト */
  .saved-section{margin:14px 12px 0;}
  .saved-title{font-size:13px;font-weight:700;color:var(--sub);margin-bottom:8px;}
  .saved-item{background:var(--card);border-radius:12px;padding:11px 12px;margin-bottom:8px;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .saved-item-info{flex:1;min-width:0;}
  .saved-item-name{font-size:14px;font-weight:700;}
  .saved-item-meta{font-size:11px;color:var(--sub);}
  .saved-item-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:5px;}
  .badge-before{background:#FFF3CD;color:#856404;}
  .badge-after{background:#D4EDDA;color:#155724;}
  .saved-actions{display:flex;gap:5px;flex-shrink:0;}
  .btn-sm{border:none;border-radius:8px;padding:7px 9px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;}
  .btn-line-sm{background:#06C755;color:#fff;}
  .btn-edit-sm{background:#EBF4FF;color:#2C5282;}
  .btn-del-sm{background:#FFF0F0;color:var(--danger);}

  /* オーバーレイ */
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end;justify-content:center;}
  .overlay.show{display:flex;}
  .overlay-box{background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:85vh;overflow-y:auto;}
  .overlay-title{font-size:16px;font-weight:800;margin-bottom:12px;}
  .overlay-btns{display:flex;gap:10px;margin-top:14px;}
  .btn-cancel{flex:1;background:#F0F0F0;color:var(--text);border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
  .btn-ok{flex:1;background:var(--sun);color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}

  /* 編集モーダル */
  .edit-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:300;flex-direction:column;}
  .edit-modal.show{display:flex;}
  .edit-toolbar{background:#1A1A1A;padding:9px 10px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;flex-shrink:0;}
  .tool-btn{background:#333;color:#fff;border:2px solid transparent;border-radius:8px;padding:6px 9px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;}
  .tool-btn.active{border-color:var(--sun);background:#444;}
  .tool-sep{width:1px;height:26px;background:#444;flex-shrink:0;}
  .color-btn{width:26px;height:26px;border-radius:50%;border:3px solid transparent;cursor:pointer;flex-shrink:0;}
  .color-btn.active{border-color:#fff;}
  .edit-canvas-wrap{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;}
  #edit-canvas{touch-action:none;cursor:crosshair;max-width:100%;max-height:100%;}
  .edit-adjust{background:#111;padding:9px 14px;flex-shrink:0;}
  .adjust-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
  .adjust-row:last-child{margin-bottom:0;}
  .adjust-label{font-size:11px;color:#aaa;width:65px;flex-shrink:0;}
  .adjust-slider{flex:1;-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:#444;outline:none;}
  .adjust-slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--sun);cursor:pointer;}
  .adjust-val{font-size:11px;color:#fff;width:28px;text-align:right;flex-shrink:0;}
  .edit-bottom{background:#1A1A1A;padding:10px 12px;display:flex;gap:10px;flex-shrink:0;}
  .btn-edit-cancel{flex:1;background:#333;color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
  .btn-edit-ok{flex:1;background:var(--sun);color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}

  /* ローディング */
  .loading-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,0.87);z-index:400;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
  .loading-overlay.show{display:flex;}
  .loading-spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--sun);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{font-size:14px;font-weight:600;color:var(--sub);}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A1A1A;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:500;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center;}
  .toast.show{opacity:1;}
  #stamp-canvas{display:none;}

  .page{display:none;}
  .page.active{display:block;}

  .info-box{background:#EBF4FF;border-radius:10px;padding:12px 14px;margin:12px 12px 0;font-size:12px;color:#2C5282;line-height:1.7;}
</style>
</head>
<body>

<div class="header">
  <span class="header-icon">🌻</span>
  <div>
    <div class="header-title">ひまわり 写真台帳</div>
    <div class="header-sub" id="header-sub">工事前写真記録アプリ</div>
  </div>
</div>

<!-- タブ -->
<div class="tabs">
  <button class="tab active" onclick="showPage('new')">📝 新規入力</button>
  <button class="tab" onclick="showPage('after')">✅ 工事後追加</button>
  <button class="tab" onclick="showPage('list')">📁 保存済み</button>
</div>

<!-- ===== 新規入力ページ ===== -->
<div class="page active" id="page-new">
  <div class="section">
    <div class="section-title">📋 基本情報</div>
    <div class="section-body">
      <div class="field"><label>顧客名</label><input type="text" id="f-name" placeholder="例：田中 太郎" autocomplete="off"></div>
      <div class="field"><label>住所</label><input type="text" id="f-addr" placeholder="例：兵庫県猪名川町○○ ○-○" autocomplete="off"></div>
      <div class="two-col">
        <div class="field"><label>日付</label><input type="date" id="f-date"></div>
        <div class="field"><label>担当者</label>
          <select id="f-staff">
            <option value="">選択</option>
            <option>藤本</option><option>濱口</option><option>三田あ</option><option>梶</option><option>その他</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <div class="places-container" id="places-container-new"></div>
  <div style="margin:0 12px"><button class="btn-add-place" onclick="addPlace()">＋ 工事箇所を追加</button></div>

  <button class="big-btn btn-save" onclick="saveRecord()">💾 保存する</button>
  <button class="big-btn btn-line" onclick="openLineSend('new')">📤 LINEで送信</button>
</div>

<!-- ===== 工事後追加ページ ===== -->
<div class="page" id="page-after">

  <!-- 保存済みから選ぶ -->
  <div class="section" style="margin-top:13px">
    <div class="section-title">📁 保存済みから選ぶ</div>
    <div class="section-body">
      <div id="after-select-list"><p style="font-size:13px;color:#aaa;padding:4px 0 8px">保存済みデータなし</p></div>
    </div>
  </div>

  <!-- LINEから読み込む -->
  <div class="section" style="margin-top:12px">
    <div class="section-title">📥 LINEのJSONから読み込む</div>
    <div class="section-body">
      <p style="font-size:12px;color:var(--sub);margin-bottom:8px;line-height:1.6">別のスマホで作成したデータはLINEからJSONをコピーして貼り付けてください。</p>
      <textarea id="json-input-after" rows="4" placeholder='{"id":"hw-...","customerName":"...' style="width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px;font-size:12px;font-family:monospace;background:#FAFAF8;"></textarea>
      <button class="big-btn btn-load-json" onclick="loadJsonFromText()" style="margin-top:8px;margin-left:0;width:100%">📥 読み込む</button>
    </div>
  </div>

  <div id="after-content" style="display:none">
    <div class="section" style="margin-top:12px">
      <div class="section-title">📋 選択中のデータ</div>
      <div class="section-body">
        <div id="after-info" style="font-size:13px;line-height:1.8;padding:4px 0 8px;"></div>
      </div>
    </div>
    <div class="places-container" id="places-container-after"></div>
    <button class="big-btn btn-line" onclick="openLineSend('after')" style="margin-top:4px">📤 完成JSONをLINEで送信</button>
    <button class="big-btn" style="background:#F0F0F0;color:#333;margin-top:8px" onclick="clearAfterData()">🗑️ クリア</button>
  </div>
</div>

<!-- ===== 保存済みページ ===== -->
<div class="page" id="page-list">
  <div class="saved-section">
    <div class="saved-title">保存済みデータ一覧</div>
    <div id="saved-list"><p style="font-size:13px;color:#aaa;padding:6px 4px">読み込み中...</p></div>
  </div>
</div>

<!-- LINE送信モーダル -->
<div class="overlay" id="line-overlay">
  <div class="overlay-box">
    <div class="overlay-title">📤 LINEで送信</div>
    <p style="font-size:13px;color:#555;line-height:1.7;margin-bottom:8px">
      ①「JSONをコピー」をタップ<br>
      ②LINEグループを開いてペースト<br>
      ③送信
    </p>
    <div class="overlay-btns">
      <button class="btn-cancel" onclick="closeOverlay('line-overlay')">キャンセル</button>
      <button class="btn-ok" onclick="copyJson()">JSONをコピー</button>
    </div>
  </div>
</div>



<!-- 写真編集モーダル -->
<div class="edit-modal" id="edit-modal">
  <div class="edit-toolbar">
    <button class="tool-btn active" id="tool-pen" onclick="setTool('pen')">✏️ ペン</button>
    <button class="tool-btn" id="tool-eraser" onclick="setTool('eraser')">🧹 消しゴム</button>
    <button class="tool-btn" onclick="undoStroke()">↩️ 戻す</button>
    <button class="tool-btn" onclick="clearStrokes()">🗑️ 全消し</button>
    <div class="tool-sep"></div>
    <button class="tool-btn active" id="size-s" onclick="setSize(4,'s')">細</button>
    <button class="tool-btn" id="size-m" onclick="setSize(8,'m')">中</button>
    <button class="tool-btn" id="size-l" onclick="setSize(16,'l')">太</button>
    <div class="tool-sep"></div>
    <div class="color-btn active" id="col-red" style="background:#FF3B30" onclick="setColor('#FF3B30','red')"></div>
    <div class="color-btn" id="col-white" style="background:#FFFFFF" onclick="setColor('#FFFFFF','white')"></div>
    <div class="color-btn" id="col-yellow" style="background:#FFD60A" onclick="setColor('#FFD60A','yellow')"></div>
    <div class="color-btn" id="col-blue" style="background:#007AFF" onclick="setColor('#007AFF','blue')"></div>
    <div class="color-btn" id="col-black" style="background:#000000" onclick="setColor('#000000','black')"></div>
  </div>
  <div class="edit-canvas-wrap"><canvas id="edit-canvas"></canvas></div>
  <div class="edit-adjust">
    <div class="adjust-row">
      <span class="adjust-label">🔆 明るさ</span>
      <input type="range" class="adjust-slider" id="sl-brightness" min="-100" max="100" value="0" oninput="applyFilters();document.getElementById('v-brightness').textContent=this.value">
      <span class="adjust-val" id="v-brightness">0</span>
    </div>
    <div class="adjust-row">
      <span class="adjust-label">◑ コントラスト</span>
      <input type="range" class="adjust-slider" id="sl-contrast" min="-100" max="100" value="0" oninput="applyFilters();document.getElementById('v-contrast').textContent=this.value">
      <span class="adjust-val" id="v-contrast">0</span>
    </div>
    <div class="adjust-row">
      <span class="adjust-label">🌈 彩度</span>
      <input type="range" class="adjust-slider" id="sl-saturation" min="-100" max="100" value="0" oninput="applyFilters();document.getElementById('v-saturation').textContent=this.value">
      <span class="adjust-val" id="v-saturation">0</span>
    </div>
  </div>
  <div class="edit-bottom">
    <button class="btn-edit-cancel" onclick="closeEditModal()">キャンセル</button>
    <button class="btn-edit-ok" onclick="commitEdit()">✅ 完了</button>
  </div>
</div>

<div class="loading-overlay" id="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loading-text">処理中...</div>
</div>

<canvas id="stamp-canvas" style="display:none"></canvas>
<div class="toast" id="toast"></div>

<script>
// =====================================================
// IndexedDB
// =====================================================
const DB_NAME='HimawariDB',DB_VER=1,STORE='records';
let db=null;
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains(STORE))d.createObjectStore(STORE,{keyPath:'id'});};
    r.onsuccess=e=>{db=e.target.result;res(db);};
    r.onerror=e=>rej(e.target.error);
  });
}
function dbPut(rec){return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).put(rec);tx.oncomplete=res;tx.onerror=e=>rej(e.target.error);});}
function dbGetAll(){return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readonly');const r=tx.objectStore(STORE).getAll();r.onsuccess=()=>res(r.result);r.onerror=e=>rej(e.target.error);});}
function dbGet(id){return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readonly');const r=tx.objectStore(STORE).get(id);r.onsuccess=()=>res(r.result);r.onerror=e=>rej(e.target.error);});}
function dbDelete(id){return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).delete(id);tx.oncomplete=res;tx.onerror=e=>rej(e.target.error);});}

// =====================================================
// 状態
// =====================================================
let places=[];
let afterData=null; // 工事後追加用に読み込んだデータ

function getToday(){return new Date().toISOString().split('T')[0];}
function fmtStamp(d){return(d||getToday()).replace(/-/g,'.');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// =====================================================
// 初期化
// =====================================================
document.addEventListener('DOMContentLoaded',async()=>{
  document.getElementById('f-date').value=getToday();
  try{await openDB();}catch(e){showToast('DB初期化エラー');}
  addPlace();
  await renderSavedList();
});

// =====================================================
// タブ切替
// =====================================================
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  const idx={'new':0,'after':1,'list':2}[name];
  document.querySelectorAll('.tab')[idx].classList.add('active');
  if(name==='list')renderSavedList();
  if(name==='after')renderAfterSelectList();
}

// =====================================================
// 新規入力：工事箇所
// =====================================================
function addPlace(){
  const id='p'+Date.now()+Math.random().toString(36).slice(2,5);
  places.push({id,locationName:'',workDetail:'',photos:[]});
  renderPlacesNew();
}
function removePlace(id){
  if(places.length<=1){showToast('最低1箇所必要です');return;}
  places=places.filter(p=>p.id!==id);
  renderPlacesNew();
}
function renderPlacesNew(){
  const c=document.getElementById('places-container-new');
  c.innerHTML='';
  places.forEach((place,idx)=>{
    const div=document.createElement('div');
    div.className='place-card';
    div.innerHTML=`
      <div class="place-header place-header-before">
        <span class="place-num">📍 工事箇所 ${idx+1}</span>
        <button class="btn-remove-place" onclick="removePlace('${place.id}')">×</button>
      </div>
      <div class="place-body">
        <div class="field"><label>工事箇所名</label>
          <input type="text" id="loc-${place.id}" placeholder="例：玄関・トイレ・浴室" value="${esc(place.locationName)}"
            oninput="places.find(p=>p.id==='${place.id}').locationName=this.value">
        </div>
        <div class="field"><label>工事内容</label>
          <textarea id="work-${place.id}" rows="3" placeholder="例：L型手すり 横40cm＋縦60cm"
            oninput="places.find(p=>p.id==='${place.id}').workDetail=this.value">${esc(place.workDetail)}</textarea>
        </div>
        <div class="field"><label>工事前写真</label>
          <div class="photo-area">
            <div class="photo-grid" id="pgrid-${place.id}"></div>
            <label class="btn-camera" style="cursor:pointer">
              📷 工事前写真を撮る

async function handlePhoto(mode,placeId,input){
  const place=places.find(p=>p.id===placeId);
  if(!place)return;
  const stamp=fmtStamp(document.getElementById('f-date').value);
  const files=Array.from(input.files);
  if(!files.length)return;
  showLoading('写真を処理中...');
  try{
    for(const file of files){
      const dataUrl=await stampDate(file,stamp);
      place.photos.push(dataUrl);
    }
    renderPhotoGrid('new',placeId);
    showToast(`写真を${files.length}枚追加しました ✓`);
  }catch(e){showToast('写真処理エラー');}
  finally{hideLoading();input.value='';}
}
function renderPhotoGrid(mode,placeId){
  const place=places.find(p=>p.id===placeId);
  const grid=document.getElementById('pgrid-'+placeId);
  if(!place||!grid)return;
  grid.innerHTML='';
  place.photos.forEach((src,i)=>{
    const wrap=document.createElement('div');
    wrap.className='photo-thumb-wrap';
    wrap.innerHTML=`
      <img src="${src}" class="photo-thumb" onclick="openEditModal('new','${placeId}',${i})">
      <button class="photo-del" onclick="removePhoto('${placeId}',${i})">×</button>`;
    grid.appendChild(wrap);
  });
}
function removePhoto(placeId,idx){
  const place=places.find(p=>p.id===placeId);
  if(!place)return;
  place.photos.splice(idx,1);
  renderPhotoGrid('new',placeId);
}
function stampDate(file,stamp){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onerror=()=>reject(new Error('読み込みエラー'));
    reader.onload=e=>{
      const img=new Image();
      img.onerror=()=>reject(new Error('画像エラー'));
      img.onload=()=>{
        let w=img.width,h=img.height;
        const max=1600;
        if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}
        const cv=document.getElementById('stamp-canvas');
        cv.width=w;cv.height=h;
        const ctx=cv.getContext('2d');
        ctx.drawImage(img,0,0,w,h);
        const fs=Math.max(20,Math.floor(w*0.044));
        ctx.font=`bold ${fs}px Arial,sans-serif`;
        const tw=ctx.measureText(stamp).width;
        ctx.shadowColor='rgba(0,0,0,0.75)';ctx.shadowBlur=5;
        ctx.fillStyle='#FFFFFF';
        ctx.fillText(stamp,w-tw-fs*0.4,h-fs*0.35);
        ctx.shadowBlur=0;
        resolve(cv.toDataURL('image/jpeg',0.82));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// =====================================================
// 写真編集モーダル
// =====================================================
let editContext=null; // {mode, placeId/idx, photoIdx}
let strokes=[],currentStroke=null;
let drawTool='pen',drawColor='#FF3B30',drawSize=4,isDrawing=false;

function openEditModal(mode,placeIdOrIdx,photoIdx){
  let src=null;
  if(mode==='new'){
    const place=places.find(p=>p.id===placeIdOrIdx);
    if(!place)return;
    src=place.photos[photoIdx];
  }else if(mode==='before'){
    src=afterData.places[placeIdOrIdx].photos[photoIdx];
  }else if(mode==='after-place'){
    src=afterData.places[placeIdOrIdx].afterPhotos[photoIdx];
  }
  if(!src)return;
  editContext={mode,placeIdOrIdx,photoIdx};
  strokes=[];
  drawTool='pen';drawColor='#FF3B30';drawSize=4;
  ['brightness','contrast','saturation'].forEach(k=>{
    document.getElementById('sl-'+k).value=0;
    document.getElementById('v-'+k).textContent='0';
  });
  const img=new Image();
  img.onload=()=>{
    const ec=document.getElementById('edit-canvas');
    const maxW=window.innerWidth;
    const maxH=window.innerHeight-200;
    let w=img.width,h=img.height;
    if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
    if(h>maxH){w=Math.round(w*maxH/h);h=maxH;}
    ec.width=w;ec.height=h;
    ec._origImg=img;
    applyFilters();
    document.getElementById('edit-modal').classList.add('show');
    setupDrawEvents(ec);
  };
  img.src=src;
function applyFilters(){
  const ec=document.getElementById("edit-canvas");
  if(!ec._origImg)return;
  const ctx=ec.getContext("2d");
  const bVal=parseInt(document.getElementById("sl-brightness").value);
  const cVal=parseInt(document.getElementById("sl-contrast").value);
  const sVal=parseInt(document.getElementById("sl-saturation").value);
  ctx.drawImage(ec._origImg,0,0,ec.width,ec.height);
  if(bVal!==0||cVal!==0||sVal!==0){
    const imageData=ctx.getImageData(0,0,ec.width,ec.height);
    const d=imageData.data;
    const bAdd=bVal*2.55;
    const cMul=(100+cVal)/100;
    const sMul=(100+sVal)/100;
    for(let i=0;i<d.length;i+=4){
      let r=d[i],g=d[i+1],b=d[i+2];
      if(sVal!==0){const gray=0.299*r+0.587*g+0.114*b;r=gray+(r-gray)*sMul;g=gray+(g-gray)*sMul;b=gray+(b-gray)*sMul;}
      if(cVal!==0){r=(r-128)*cMul+128;g=(g-128)*cMul+128;b=(b-128)*cMul+128;}
      r+=bAdd;g+=bAdd;b+=bAdd;
      d[i]=Math.min(255,Math.max(0,r));d[i+1]=Math.min(255,Math.max(0,g));d[i+2]=Math.min(255,Math.max(0,b));
    }
    ctx.putImageData(imageData,0,0);
  }
  redrawStrokes(ctx);
}
}
function redrawStrokes(ctx){
  strokes.forEach(st=>{
    if(!st.points||st.points.length<2)return;
    ctx.save();
    if(st.tool==='eraser'){ctx.globalCompositeOperation='destination-out';ctx.strokeStyle='rgba(0,0,0,1)';}
    else{ctx.globalCompositeOperation='source-over';ctx.strokeStyle=st.color;}
    ctx.lineWidth=st.size;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();
    const pts=st.points;const n=pts.length;
    ctx.moveTo(pts[0].x,pts[0].y);
    if(n===2){ctx.lineTo(pts[1].x,pts[1].y);}
    else{
      for(let i=1;i<n-1;i++){
        const mx=(pts[i].x+pts[i+1].x)/2;
        const my=(pts[i].y+pts[i+1].y)/2;
        ctx.quadraticCurveTo(pts[i].x,pts[i].y,mx,my);
      }
      ctx.lineTo(pts[n-1].x,pts[n-1].y);
    }
    ctx.stroke();ctx.restore();
  });
}
function setupDrawEvents(ec){
  // pointer と touch 両方登録（iOS Safari対応）
  ec.removeEventListener('pointerdown',startDraw);
  ec.removeEventListener('pointermove',moveDraw);
  ec.removeEventListener('pointerup',endDraw);
  ec.removeEventListener('pointercancel',endDraw);
  ec.removeEventListener('touchstart',touchStart);
  ec.removeEventListener('touchmove',touchMove);
  ec.removeEventListener('touchend',touchEnd);
  ec.addEventListener('pointerdown',startDraw,{passive:false});
  ec.addEventListener('pointermove',moveDraw,{passive:false});
  ec.addEventListener('pointerup',endDraw,{passive:false});
  ec.addEventListener('pointercancel',endDraw,{passive:false});
  ec.addEventListener('touchstart',touchStart,{passive:false});
  ec.addEventListener('touchmove',touchMove,{passive:false});
  ec.addEventListener('touchend',touchEnd,{passive:false});
}
function touchStart(e){e.preventDefault();const ec=document.getElementById('edit-canvas');isDrawing=true;currentStroke={points:[getTouchPos(e,ec)],color:drawColor,size:drawSize,tool:drawTool};}
function touchMove(e){
  e.preventDefault();if(!isDrawing||!currentStroke)return;
  const ec=document.getElementById('edit-canvas');const pos=getTouchPos(e,ec);
  currentStroke.points.push(pos);
  drawSmooth(ec,currentStroke.points);
}
function touchEnd(e){if(!isDrawing)return;isDrawing=false;if(currentStroke&&currentStroke.points.length>0)strokes.push(currentStroke);currentStroke=null;}
function getTouchPos(e,ec){
  const rect=ec.getBoundingClientRect();
  const t=e.touches[0]||e.changedTouches[0];
  return{x:(t.clientX-rect.left)*(ec.width/rect.width),y:(t.clientY-rect.top)*(ec.height/rect.height)};
}
function getPos(e,ec){
  const rect=ec.getBoundingClientRect();
  let cx=e.clientX,cy=e.clientY;
  if(e.touches){cx=e.touches[0].clientX;cy=e.touches[0].clientY;}
  return{x:(cx-rect.left)*(ec.width/rect.width),y:(cy-rect.top)*(ec.height/rect.height)};
}
function startDraw(e){e.preventDefault();isDrawing=true;const ec=document.getElementById('edit-canvas');currentStroke={points:[getPos(e,ec)],color:drawColor,size:drawSize,tool:drawTool};}
function moveDraw(e){
  e.preventDefault();if(!isDrawing||!currentStroke)return;
  const ec=document.getElementById('edit-canvas');const pos=getPos(e,ec);
  currentStroke.points.push(pos);
  drawSmooth(ec,currentStroke.points);
}
function drawSmooth(ec,pts){
  if(pts.length<2)return;
  const ctx=ec.getContext('2d');
  ctx.save();
  if(drawTool==='eraser'){ctx.globalCompositeOperation='destination-out';ctx.strokeStyle='rgba(0,0,0,1)';}
  else{ctx.globalCompositeOperation='source-over';ctx.strokeStyle=drawColor;}
  ctx.lineWidth=drawSize;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();
  if(pts.length===2){
    ctx.moveTo(pts[0].x,pts[0].y);
    ctx.lineTo(pts[1].x,pts[1].y);
  } else {
    // ベジェ曲線でスムージング
    const n=pts.length;
    ctx.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<n-1;i++){
      const mx=(pts[i].x+pts[i+1].x)/2;
      const my=(pts[i].y+pts[i+1].y)/2;
      ctx.quadraticCurveTo(pts[i].x,pts[i].y,mx,my);
    }
    ctx.lineTo(pts[n-1].x,pts[n-1].y);
  }
  ctx.stroke();
  ctx.restore();
}
function endDraw(e){if(!isDrawing)return;isDrawing=false;if(currentStroke&&currentStroke.points.length>0)strokes.push(currentStroke);currentStroke=null;}
function undoStroke(){if(strokes.length===0)return;strokes.pop();applyFilters();}
function clearStrokes(){strokes=[];applyFilters();}
function setTool(t){drawTool=t;document.getElementById('tool-pen').classList.toggle('active',t==='pen');document.getElementById('tool-eraser').classList.toggle('active',t==='eraser');}
function setSize(s,id){drawSize=s;['s','m','l'].forEach(x=>document.getElementById('size-'+x).classList.remove('active'));document.getElementById('size-'+id).classList.add('active');}
function setColor(c,id){drawColor=c;['red','white','yellow','blue','black'].forEach(x=>document.getElementById('col-'+x).classList.remove('active'));document.getElementById('col-'+id).classList.add('active');if(drawTool==='eraser')setTool('pen');}
function commitEdit(){
  const ec=document.getElementById('edit-canvas');
  const dataUrl=ec.toDataURL('image/jpeg',0.88);
  const {mode,placeIdOrIdx,photoIdx}=editContext;
  if(mode==='new'){
    const place=places.find(p=>p.id===placeIdOrIdx);
    if(place)place.photos[photoIdx]=dataUrl;
    renderPhotoGrid('new',placeIdOrIdx);
  }else if(mode==='after-place'){
    afterData.places[placeIdOrIdx].afterPhotos[photoIdx]=dataUrl;
    renderAfterPhotoGrid(placeIdOrIdx);
  }
  closeEditModal();
  showToast('編集を保存しました ✓');
}
function closeEditModal(){document.getElementById('edit-modal').classList.remove('show');}

// 保存・送信
// =====================================================
function collectNewData(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){showToast('顧客名を入力してください');return null;}
  return{
    id:'hw-'+Date.now(),savedAt:new Date().toISOString(),
    customerName:name,
    address:document.getElementById('f-addr').value.trim(),
    date:document.getElementById('f-date').value,
    staff:document.getElementById('f-staff').value,
    places:places.map((p,i)=>({index:i+1,locationName:p.locationName,workDetail:p.workDetail,photos:p.photos,afterPhotos:[]}))
  };
}
async function saveRecord(){
  const data=collectNewData();if(!data)return;
  showLoading('保存中...');
  try{await dbPut(data);await renderSavedList();showToast('保存しました ✓');}
  catch(e){showToast('保存エラー: '+e.message);}
  finally{hideLoading();}
}
async function renderSavedList(){
  const c=document.getElementById('saved-list');
  try{
    const records=await dbGetAll();
    if(!records||records.length===0){c.innerHTML='<p style="font-size:13px;color:#aaa;padding:6px 4px">保存済みデータなし</p>';return;}
    records.sort((a,b)=>b.savedAt.localeCompare(a.savedAt));
    c.innerHTML='';
    records.forEach(r=>{
      const hasAfter=r.places.some(p=>p.afterPhotos&&p.afterPhotos.length>0);
      const badge=hasAfter?'<span class="saved-item-badge badge-after">工事後あり</span>':'<span class="saved-item-badge badge-before">工事前のみ</span>';
      const div=document.createElement('div');
      div.className='saved-item';
      div.innerHTML=`
        <div class="saved-item-info">
          <div class="saved-item-name">${esc(r.customerName)}${badge}</div>
          <div class="saved-item-meta">${r.date||''} / ${esc(r.staff||'')} / ${r.places.length}箇所</div>
          <div class="saved-item-meta" style="color:#444;font-size:11px">${r.places.map(p=>esc(p.locationName||'－')).join('　')}</div>
        </div>
        <div class="saved-actions">
          <button class="btn-sm btn-line-sm" onclick="sendSavedItem('${r.id}')">LINE</button>
          <button class="btn-sm btn-del-sm" onclick="deleteItem('${r.id}')">削除</button>
        </div>`;
      c.appendChild(div);
    });
  }catch(e){c.innerHTML='<p style="font-size:13px;color:#c00">読み込みエラー</p>';}
}
async function deleteItem(id){
  if(!confirm('このデータを削除しますか？'))return;
  await dbDelete(id);await renderSavedList();showToast('削除しました');
}

let _copyJson=null;
function openLineSend(mode){
  let data=null;
  if(mode==='new'){data=collectNewData();if(!data)return;}
  else if(mode==='after'){if(!afterData){showToast('データが読み込まれていません');return;}data=afterData;}
  _copyJson=JSON.stringify(data);
  document.getElementById('line-overlay').classList.add('show');
}
async function sendSavedItem(id){
  showLoading('取得中...');
  try{const r=await dbGet(id);if(!r){showToast('データが見つかりません');return;}_copyJson=JSON.stringify(r);document.getElementById('line-overlay').classList.add('show');}
  catch(e){showToast('取得エラー');}finally{hideLoading();}
}
function closeOverlay(id){document.getElementById(id).classList.remove('show');}
async function copyJson(){
  if(!_copyJson)return;
  try{await navigator.clipboard.writeText(_copyJson);}
  catch(e){const ta=document.createElement('textarea');ta.value=_copyJson;ta.style.cssText='position:fixed;top:-9999px;';document.body.appendChild(ta);ta.focus();ta.select();document.execCommand('copy');document.body.removeChild(ta);}
  showToast('コピーしました！LINEにペーストしてください ✓');
  closeOverlay('line-overlay');
}

function showLoading(msg){document.getElementById('loading-text').textContent=msg||'処理中...';document.getElementById('loading-overlay').classList.add('show');}
function hideLoading(){document.getElementById('loading-overlay').classList.remove('show');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
