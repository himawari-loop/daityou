<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ひまわり 写真台帳</title>
<style>
  :root {
    --sun: #F5A623;
    --sun-dark: #D4881A;
    --green: #2D6A4F;
    --bg: #FFFBF2;
    --card: #FFFFFF;
    --text: #1A1A1A;
    --text-sub: #666;
    --border: #E8DCC8;
    --danger: #E53E3E;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 50px;
  }

  .header {
    background: linear-gradient(135deg, var(--sun) 0%, var(--sun-dark) 100%);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 2px 8px rgba(245,166,35,0.3);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-icon { font-size: 24px; }
  .header-title { font-size: 18px; font-weight: 800; color: #fff; }
  .header-sub { font-size: 11px; color: rgba(255,255,255,0.85); }

  .section {
    margin: 14px 13px 0;
    background: var(--card);
    border-radius: 14px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .section-title {
    background: var(--green);
    color: #fff;
    padding: 9px 15px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  .section-body { padding: 13px 13px 5px; }

  .field { margin-bottom: 11px; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-sub);
    margin-bottom: 4px;
  }
  input[type=text], input[type=date], select, textarea {
    width: 100%;
    padding: 11px 13px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 16px;
    font-family: inherit;
    background: #FAFAF8;
    color: var(--text);
    -webkit-appearance: none;
    appearance: none;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--sun);
    background: #fff;
  }
  textarea { resize: vertical; min-height: 68px; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .places-container { margin: 14px 13px 0; }
  .place-card {
    background: var(--card);
    border-radius: 14px;
    box-shadow: var(--shadow);
    margin-bottom: 13px;
    overflow: hidden;
  }
  .place-header {
    background: linear-gradient(90deg, var(--sun) 0%, #F7BA5A 100%);
    padding: 9px 13px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .place-num { font-size: 13px; font-weight: 800; color: #fff; }
  .btn-remove-place {
    background: rgba(255,255,255,0.3);
    border: none;
    color: #fff;
    font-size: 20px;
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    line-height: 1;
    display: flex; align-items: center; justify-content: center;
  }
  .place-body { padding: 11px 11px 7px; }

  .photo-area {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 9px;
    background: #FAFAF8;
  }
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-bottom: 7px;
  }
  .photo-thumb-wrap { position: relative; }
  .photo-thumb {
    aspect-ratio: 1;
    border-radius: 8px;
    object-fit: cover;
    width: 100%;
    cursor: pointer;
  }
  .photo-del {
    position: absolute;
    top: -5px; right: -5px;
    background: var(--danger);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 22px; height: 22px;
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
  }
  .btn-camera {
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 11px;
    font-size: 14px;
    font-weight: 700;
    width: 100%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-family: inherit;
  }
  input[type=file] { display: none; }

  .btn-add-place {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: #fff;
    border: 2px dashed var(--sun);
    color: var(--sun-dark);
    border-radius: 12px;
    padding: 13px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    margin-bottom: 13px;
    font-family: inherit;
  }

  .btn-save {
    display: block;
    width: calc(100% - 26px);
    margin: 14px 13px 0;
    background: linear-gradient(135deg, var(--sun) 0%, var(--sun-dark) 100%);
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-size: 17px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 4px 16px rgba(245,166,35,0.4);
  }
  .btn-line {
    display: block;
    width: calc(100% - 26px);
    margin: 9px 13px 0;
    background: #06C755;
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 15px;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 4px 14px rgba(6,199,85,0.35);
  }

  .saved-section { margin: 16px 13px 0; }
  .saved-title {
    font-size: 13px; font-weight: 700;
    color: var(--text-sub); margin-bottom: 8px; padding-left: 3px;
  }
  .saved-item {
    background: var(--card);
    border-radius: 12px;
    padding: 11px 13px;
    margin-bottom: 8px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .saved-item-info { flex: 1; min-width: 0; }
  .saved-item-name { font-size: 14px; font-weight: 700; }
  .saved-item-meta { font-size: 11px; color: var(--text-sub); }
  .saved-item-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .btn-sm {
    border: none; border-radius: 8px;
    padding: 7px 11px; font-size: 12px; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }
  .btn-line-sm { background: #06C755; color: #fff; }
  .btn-del-sm { background: #FFF0F0; color: var(--danger); }

  /* Overlay */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 200;
    align-items: flex-end; justify-content: center;
  }
  .overlay.show { display: flex; }
  .overlay-box {
    background: #fff; border-radius: 20px 20px 0 0;
    padding: 22px; width: 100%; max-height: 80vh; overflow-y: auto;
  }
  .overlay-title { font-size: 16px; font-weight: 800; margin-bottom: 13px; }
  .overlay-btns { display: flex; gap: 10px; margin-top: 14px; }
  .btn-cancel {
    flex: 1; background: #F0F0F0; color: var(--text); border: none;
    border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }
  .btn-ok {
    flex: 1; background: var(--sun); color: #fff; border: none;
    border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }

  /* Loading overlay */
  .loading-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(255,255,255,0.85); z-index: 300;
    align-items: center; justify-content: center; flex-direction: column; gap: 12px;
  }
  .loading-overlay.show { display: flex; }
  .loading-spinner {
    width: 40px; height: 40px;
    border: 4px solid var(--border);
    border-top-color: var(--sun);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; font-weight: 600; color: var(--text-sub); }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%);
    background: #1A1A1A; color: #fff;
    padding: 10px 20px; border-radius: 20px;
    font-size: 13px; font-weight: 600;
    z-index: 400; opacity: 0; transition: opacity 0.3s;
    pointer-events: none; white-space: nowrap; max-width: 90vw;
    text-align: center;
  }
  .toast.show { opacity: 1; }

  #stamp-canvas { display: none; }
</style>
</head>
<body>

<div class="header">
  <span class="header-icon">🌻</span>
  <div>
    <div class="header-title">ひまわり 写真台帳</div>
    <div class="header-sub">工事前写真記録アプリ</div>
  </div>
</div>

<!-- 基本情報 -->
<div class="section">
  <div class="section-title">📋 基本情報</div>
  <div class="section-body">
    <div class="field">
      <label>顧客名</label>
      <input type="text" id="f-name" placeholder="例：田中 太郎" autocomplete="off">
    </div>
    <div class="field">
      <label>住所</label>
      <input type="text" id="f-addr" placeholder="例：兵庫県猪名川町○○ ○-○" autocomplete="off">
    </div>
    <div class="two-col">
      <div class="field">
        <label>日付</label>
        <input type="date" id="f-date">
      </div>
      <div class="field">
        <label>担当者</label>
        <select id="f-staff">
          <option value="">選択</option>
          <option>藤本</option>
          <option>濱口</option>
          <option>三田あ</option>
          <option>梶</option>
          <option>その他</option>
        </select>
      </div>
    </div>
  </div>
</div>

<!-- 工事箇所 -->
<div class="places-container" id="places-container"></div>

<!-- 箇所追加 -->
<div style="margin:0 13px">
  <button class="btn-add-place" onclick="addPlace()">＋ 工事箇所を追加</button>
</div>

<!-- 保存・送信 -->
<button class="btn-save" onclick="saveRecord()">💾 保存する</button>
<button class="btn-line" onclick="openLineSend()">📤 LINEで送信</button>

<!-- 保存済みリスト -->
<div class="saved-section">
  <div class="saved-title">📁 保存済みデータ</div>
  <div id="saved-list"><p style="font-size:13px;color:#aaa;padding:6px 4px">読み込み中...</p></div>
</div>

<!-- LINE送信モーダル -->
<div class="overlay" id="line-overlay">
  <div class="overlay-box">
    <div class="overlay-title">📤 LINEで送信</div>
    <p style="font-size:13px;color:#555;line-height:1.7;margin-bottom:8px">
      ①「JSONをコピー」をタップ<br>
      ②LINEを開いて「Keep」または自分へのトークにペースト
    </p>
    <p style="font-size:11px;color:#aaa;line-height:1.5">
      ※写真データも含まれます。文字数が多い場合はLINEが分割することがあります
    </p>
    <div class="overlay-btns">
      <button class="btn-cancel" onclick="closeOverlay()">キャンセル</button>
      <button class="btn-ok" onclick="copyJson()">JSONをコピー</button>
    </div>
  </div>
</div>

<!-- ローディング -->
<div class="loading-overlay" id="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loading-text">処理中...</div>
</div>

<canvas id="stamp-canvas"></canvas>
<div class="toast" id="toast"></div>

<script>
// ====================================================
// IndexedDB セットアップ
// ====================================================
const DB_NAME = 'HimawariDB';
const DB_VERSION = 1;
const STORE_NAME = 'records';
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME, { keyPath: 'id' });
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = (e) => reject(e.target.error);
  });
}

function dbPut(record) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).put(record);
    tx.oncomplete = resolve;
    tx.onerror = (e) => reject(e.target.error);
  });
}

function dbGetAll() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readonly');
    const req = tx.objectStore(STORE_NAME).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = (e) => reject(e.target.error);
  });
}

function dbGet(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readonly');
    const req = tx.objectStore(STORE_NAME).get(id);
    req.onsuccess = () => resolve(req.result);
    req.onerror = (e) => reject(e.target.error);
  });
}

function dbDelete(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).delete(id);
    tx.oncomplete = resolve;
    tx.onerror = (e) => reject(e.target.error);
  });
}

// ====================================================
// アプリ状態
// ====================================================
let places = [];

function getToday() {
  return new Date().toISOString().split('T')[0];
}
function fmtStamp(dateStr) {
  return (dateStr || getToday()).replace(/-/g, '.');
}

// ====================================================
// 初期化
// ====================================================
document.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('f-date').value = getToday();
  try {
    await openDB();
  } catch(e) {
    showToast('DB初期化エラー: ' + e.message);
  }
  addPlace();
  await renderSavedList();
});

// ====================================================
// 工事箇所
// ====================================================
function addPlace() {
  const id = 'p' + Date.now() + Math.random().toString(36).slice(2,6);
  places.push({ id, locationName: '', workDetail: '', photos: [] });
  renderPlaces();
}

function removePlace(id) {
  if (places.length <= 1) { showToast('最低1箇所必要です'); return; }
  places = places.filter(p => p.id !== id);
  renderPlaces();
}

function renderPlaces() {
  const c = document.getElementById('places-container');
  c.innerHTML = '';
  places.forEach((place, idx) => {
    const div = document.createElement('div');
    div.className = 'place-card';
    div.innerHTML = `
      <div class="place-header">
        <span class="place-num">📍 工事箇所 ${idx + 1}</span>
        <button class="btn-remove-place" onclick="removePlace('${place.id}')">×</button>
      </div>
      <div class="place-body">
        <div class="field">
          <label>工事箇所名</label>
          <input type="text" id="loc-${place.id}" placeholder="例：玄関・トイレ・浴室 等"
            value="${esc(place.locationName)}"
            oninput="places.find(p=>p.id==='${place.id}').locationName=this.value">
        </div>
        <div class="field">
          <label>工事内容（手すりの形状・長さ等）</label>
          <textarea id="work-${place.id}" rows="3"
            placeholder="例：L型手すり 横40cm＋縦60cm、ステンレス製"
            oninput="places.find(p=>p.id==='${place.id}').workDetail=this.value">${esc(place.workDetail)}</textarea>
        </div>
        <div class="field">
          <label>工事前写真</label>
          <div class="photo-area">
            <div class="photo-grid" id="pgrid-${place.id}"></div>
            <label class="btn-camera" style="cursor:pointer">
              📷 写真を撮る・選ぶ
              <input type="file" accept="image/*" capture="environment" multiple
                onchange="handlePhoto('${place.id}',this)">
            </label>
          </div>
        </div>
      </div>`;
    c.appendChild(div);
    renderPhotoGrid(place.id);
  });
}

function renderPhotoGrid(placeId) {
  const place = places.find(p => p.id === placeId);
  const grid = document.getElementById('pgrid-' + placeId);
  if (!place || !grid) return;
  grid.innerHTML = '';
  place.photos.forEach((src, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'photo-thumb-wrap';
    wrap.innerHTML = `
      <img src="${src}" class="photo-thumb" onclick="previewPhoto('${src}')">
      <button class="photo-del" onclick="removePhoto('${placeId}',${i})">×</button>`;
    grid.appendChild(wrap);
  });
}

function removePhoto(placeId, idx) {
  const place = places.find(p => p.id === placeId);
  if (!place) return;
  place.photos.splice(idx, 1);
  renderPhotoGrid(placeId);
}

// ====================================================
// カメラ・写真処理
// ====================================================
async function handlePhoto(placeId, input) {
  const place = places.find(p => p.id === placeId);
  if (!place) return;
  const stamp = fmtStamp(document.getElementById('f-date').value);
  const files = Array.from(input.files);
  if (!files.length) return;

  showLoading('写真を処理中...');
  try {
    for (const file of files) {
      const dataUrl = await stampDate(file, stamp);
      place.photos.push(dataUrl);
    }
    renderPhotoGrid(placeId);
    showToast(`写真を${files.length}枚追加しました ✓`);
  } catch(e) {
    showToast('写真処理エラー: ' + e.message);
  } finally {
    hideLoading();
    input.value = '';
  }
}

function stampDate(file, stamp) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('ファイル読み込みエラー'));
    reader.onload = (e) => {
      const img = new Image();
      img.onerror = () => reject(new Error('画像読み込みエラー'));
      img.onload = () => {
        try {
          // 長辺1600px以下にリサイズ（容量削減）
          let w = img.width, h = img.height;
          const maxSide = 1600;
          if (w > maxSide || h > maxSide) {
            if (w > h) { h = Math.round(h * maxSide / w); w = maxSide; }
            else { w = Math.round(w * maxSide / h); h = maxSide; }
          }
          const canvas = document.getElementById('stamp-canvas');
          canvas.width = w;
          canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);

          // 日付焼き込み（右下）
          const fontSize = Math.max(20, Math.floor(w * 0.044));
          ctx.font = `bold ${fontSize}px Arial, sans-serif`;
          const tw = ctx.measureText(stamp).width;
          const px = w - tw - fontSize * 0.4;
          const py = h - fontSize * 0.35;

          // 影
          ctx.shadowColor = 'rgba(0,0,0,0.75)';
          ctx.shadowBlur = 5;
          ctx.fillStyle = '#FFFFFF';
          ctx.fillText(stamp, px, py);
          ctx.shadowBlur = 0;

          resolve(canvas.toDataURL('image/jpeg', 0.82));
        } catch(err) { reject(err); }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ====================================================
// データ収集
// ====================================================
function collectData() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('顧客名を入力してください'); return null; }
  return {
    id: 'hw-' + Date.now(),
    savedAt: new Date().toISOString(),
    customerName: name,
    address: document.getElementById('f-addr').value.trim(),
    date: document.getElementById('f-date').value,
    staff: document.getElementById('f-staff').value,
    places: places.map((p, i) => ({
      index: i + 1,
      locationName: p.locationName,
      workDetail: p.workDetail,
      photos: p.photos
    }))
  };
}

// ====================================================
// 保存（IndexedDB）
// ====================================================
async function saveRecord() {
  const data = collectData();
  if (!data) return;
  showLoading('保存中...');
  try {
    await dbPut(data);
    await renderSavedList();
    showToast('保存しました ✓');
  } catch(e) {
    showToast('保存エラー: ' + e.message);
  } finally {
    hideLoading();
  }
}

// ====================================================
// 保存済みリスト
// ====================================================
async function renderSavedList() {
  const c = document.getElementById('saved-list');
  try {
    const records = await dbGetAll();
    if (!records || records.length === 0) {
      c.innerHTML = '<p style="font-size:13px;color:#aaa;padding:6px 4px">保存済みデータなし</p>';
      return;
    }
    records.sort((a,b) => b.savedAt.localeCompare(a.savedAt));
    c.innerHTML = '';
    records.forEach(r => {
      const div = document.createElement('div');
      div.className = 'saved-item';
      div.innerHTML = `
        <div class="saved-item-info">
          <div class="saved-item-name">${esc(r.customerName)}</div>
          <div class="saved-item-meta">${r.date||''} / ${esc(r.staff||'')} / ${r.places.length}箇所</div>
        </div>
        <div class="saved-item-actions">
          <button class="btn-sm btn-line-sm" onclick="sendLineItem('${r.id}')">LINE</button>
          <button class="btn-sm btn-del-sm" onclick="deleteItem('${r.id}')">削除</button>
        </div>`;
      c.appendChild(div);
    });
  } catch(e) {
    c.innerHTML = '<p style="font-size:13px;color:#c00;padding:6px 4px">読み込みエラー</p>';
  }
}

async function deleteItem(id) {
  if (!confirm('このデータを削除しますか？')) return;
  await dbDelete(id);
  await renderSavedList();
  showToast('削除しました');
}

// ====================================================
// LINE送信
// ====================================================
let _copyJson = null;

function openLineSend() {
  const data = collectData();
  if (!data) return;
  _copyJson = JSON.stringify(data);
  document.getElementById('line-overlay').classList.add('show');
}

async function sendLineItem(id) {
  showLoading('データを取得中...');
  try {
    const r = await dbGet(id);
    if (!r) { showToast('データが見つかりません'); return; }
    _copyJson = JSON.stringify(r);
    document.getElementById('line-overlay').classList.add('show');
  } catch(e) {
    showToast('取得エラー: ' + e.message);
  } finally {
    hideLoading();
  }
}

function closeOverlay() {
  document.getElementById('line-overlay').classList.remove('show');
}

async function copyJson() {
  if (!_copyJson) return;
  try {
    await navigator.clipboard.writeText(_copyJson);
    showToast('コピーしました！LINEにペーストしてください ✓');
    closeOverlay();
  } catch(e) {
    // Safari fallback
    const ta = document.createElement('textarea');
    ta.value = _copyJson;
    ta.style.cssText = 'position:fixed;top:-9999px;left:0;opacity:0;';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try { document.execCommand('copy'); } catch(e2) {}
    document.body.removeChild(ta);
    showToast('コピーしました！LINEにペーストしてください ✓');
    closeOverlay();
  }
}

// ====================================================
// Util
// ====================================================
function previewPhoto(src) {
  const ov = document.createElement('div');
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:500;display:flex;align-items:center;justify-content:center;';
  ov.innerHTML = `<img src="${src}" style="max-width:96%;max-height:96vh;border-radius:8px;object-fit:contain;">`;
  ov.onclick = () => document.body.removeChild(ov);
  document.body.appendChild(ov);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showLoading(msg) {
  document.getElementById('loading-text').textContent = msg || '処理中...';
  document.getElementById('loading-overlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loading-overlay').classList.remove('show');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
